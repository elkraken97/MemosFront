<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERE · Kiosco</title>
<style>
:root{--bg:#0b0d11;--bg2:#12151a;--accent:#4dabff;--green:#40e0d0;--red:#ff5e7e;--text:#d8dee9;--muted:#717b91}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:20px;font-weight:700;color:var(--accent)}
.app{display:flex;flex:1;height:calc(100vh - 48px)}
.sidebar{width:320px;background:var(--bg2);padding:15px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;border-right:1px solid #2d3544}
.main{flex:1;padding:20px;display:flex;justify-content:center;align-items:flex-start;background:#0a0c10}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:#1a1e26;border:1px solid #2d3544;border-radius:6px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:700}.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--accent)}
.stat-l{font-size:9px;color:var(--muted)}
input,select{width:100%;background:var(--bg);border:1px solid #2d3544;border-radius:4px;padding:10px;color:var(--text);font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
.btn{width:100%;padding:12px;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:13px;text-transform:uppercase}
.btn-p{background:var(--accent);color:#000}.btn-d{background:transparent;color:var(--red);border:1px solid var(--red)}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.info{background:var(--bg);border:1px solid #2d3544;border-radius:4px;padding:10px;text-align:center;font-size:16px;font-weight:700;color:var(--accent)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.tab{padding:8px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;border-radius:4px;background:#1a1e26;color:var(--muted);border:1px solid #2d3544}
.tab.active{background:var(--accent);color:#000}
.nav-links{display:flex;gap:6px}
.nav-btn{padding:6px 14px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;text-decoration:none;cursor:pointer;border:1px solid #2d3544;background:#1a1e26;color:var(--muted);transition:all .15s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.panel{display:none;flex-direction:column;gap:10px}.panel.active{display:flex}
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border-left:4px solid var(--accent);padding:14px 20px;font-size:12px;display:none;z-index:1000}
#toast.success{border-color:var(--green)}#toast.error{border-color:var(--red)}
#parking{display:flex;flex-direction:column;gap:8px;background:#0f1115;padding:20px;border-radius:10px}
.fila{display:flex;gap:8px;align-items:center;justify-content:center}
.fila-lbl{width:35px;text-align:center;font-size:11px;color:rgba(255,255,255,.15);font-weight:700;letter-spacing:1px}
.cajon{width:65px;height:65px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;gap:2px;border:2px solid transparent}
.cajon.libre{background:rgba(16,185,129,.08);color:var(--green);border-color:rgba(16,185,129,.2)}
.cajon.libre:hover{background:rgba(16,185,129,.18);transform:scale(1.05);box-shadow:0 0 12px rgba(16,185,129,.15)}
.cajon.ocupado{background:rgba(239,68,68,.08);color:var(--red);border-color:rgba(239,68,68,.15);cursor:pointer}  /* ← se permite clic */
.cajon.sel{background:rgba(77,171,255,.12);border-color:var(--accent);box-shadow:0 0 15px rgba(77,171,255,.25)}
.cajon-icon{font-size:18px}
.registro-view{width:min(980px,100%);background:#0f1115;padding:18px;border-radius:10px;display:flex;flex-direction:column;gap:14px}
.registro-head{display:flex;justify-content:space-between;gap:10px;align-items:center;border-bottom:1px solid #2d3544;padding-bottom:12px}
.registro-title{font-size:18px;font-weight:700;color:var(--accent)}
.registro-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.registro-section{background:var(--bg);border:1px solid #2d3544;border-radius:6px;overflow:hidden}
.registro-section h3{font-size:12px;text-transform:uppercase;color:var(--muted);padding:10px;border-bottom:1px solid #2d3544}
.registro-list{display:flex;flex-direction:column;max-height:520px;overflow:auto}
.registro-item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px;border-bottom:1px solid #202632;font-size:12px}
.registro-item:last-child{border-bottom:none}
.registro-main{font-weight:700;color:var(--text)}
.registro-meta{color:var(--muted);margin-top:3px;font-size:11px}
.registro-amount{font-weight:700;color:var(--green);text-align:right}
.registro-pill{display:inline-block;font-size:10px;text-transform:uppercase;color:#000;background:var(--accent);border-radius:4px;padding:3px 6px;margin-left:5px}
.registro-pill.off{background:var(--muted);color:#000}
.corte-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;font-size:11px;color:var(--muted)}
@media(max-width:780px){.registro-grid{grid-template-columns:1fr}.registro-head{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>

<header>
  <div class="logo">TERE · <span style="color:var(--muted);font-size:13px" id="sede-nombre">--</span></div>
  <nav class="nav-links">
    <a class="nav-btn active" href="index.html">Kiosco</a>
    <a class="nav-btn" href="pension.html">＋ Pensión</a>
    <a class="nav-btn" href="cliente.html">Cliente</a>
    <a class="nav-btn" href="registros.html">Registros</a>
    <a class="nav-btn" href="sedes.html">Sedes</a>
    <a class="nav-btn" href="#" onclick="cerrarSesion()">Salir</a>
  </nav>
  <div id="clock" style="color:var(--accent)">--</div>
</header>

<div class="app">
<aside class="sidebar">
  <div class="stats">
    <div class="stat"><div class="stat-n g" id="libres">0</div><div class="stat-l">Libres</div></div>
    <div class="stat"><div class="stat-n r" id="ocupados">0</div><div class="stat-l">Ocupados</div></div>
    <div class="stat"><div class="stat-n b" id="pension">0</div><div class="stat-l">Pensión</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="cambiarTab('entrada')">Entrada</div>
    <div class="tab" onclick="cambiarTab('salida')">Salida</div>
  </div>

  <div class="panel active" id="panel-entrada">
    <div><div class="lbl">Placa</div><input type="text" id="placa" placeholder="ABC-123" maxlength="10" oninput="this.value=this.value.toUpperCase()"></div>
    <!-- Sección de cajón: cambia entre libre (selección) y ocupado (información) -->
    <div id="cajon-seleccion-container">
      <div class="lbl">Cajón</div>
      <div class="info" id="cajon-sel">— Ninguno</div>
    </div>
    <div id="cajon-ocupado-container" style="display:none;">
      <div class="lbl" style="color:var(--red);">Cajón ocupado</div>
      <div class="info" style="border-color:var(--red);">
        <div style="font-size:14px; font-weight:700;" id="cajon-ocupado-placa">--</div>
        <div class="lbl" style="margin-top:4px;">Número: <span id="cajon-ocupado-num">--</span></div>
      </div>
    </div>
    <button class="btn btn-p" onclick="entrada()">REGISTRAR ENTRADA</button>
  </div>

  <div class="panel" id="panel-salida">
    <div><div class="lbl">Buscar placa</div><input type="text" id="buscar" placeholder="ABC-123" maxlength="10" oninput="this.value=this.value.toUpperCase();buscarSalida()"></div>
    <div id="info-salida" style="display:none;background:var(--bg);padding:10px;font-size:12px;border-radius:4px"></div>
    <div id="conv-box" style="display:none;background:var(--bg);padding:10px;border-radius:4px">
      <div class="lbl">Código convenio</div>
      <input type="text" id="codigo" placeholder="EMP001" oninput="this.value=this.value.toUpperCase()">
      <button class="btn" style="background:var(--accent);color:#000;margin-top:5px" onclick="aplicarConv()">APLICAR</button>
      <div id="conv-msg" style="font-size:11px;margin-top:4px"></div>
    </div>
    <div id="total-box" style="display:none;background:var(--bg);padding:12px;text-align:center;border-radius:4px">
      <div style="font-size:10px;color:var(--muted)">TOTAL</div>
      <div style="font-size:26px;font-weight:700;color:var(--green)" id="total-txt">$0</div>
    </div>
    <button class="btn btn-d" onclick="salida()">FINALIZAR</button>
  </div>

  <div style="margin-top:8px;padding:10px;background:var(--bg);border-radius:6px;display:none" id="admin-config">
    <div class="lbl">⚙️ Configurar cajones</div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <input type="number" id="cfg-filas" placeholder="Filas" value="4" min="1" max="10" style="width:50%">
      <input type="number" id="cfg-columnas" placeholder="Columnas" value="6" min="1" max="10" style="width:50%">
    </div>
    <button class="btn" style="background:var(--accent);color:#000;margin-top:6px" onclick="generarCajones()">REGENERAR</button>
  </div>
</aside>
<main class="main"><div id="parking"><div style="color:var(--muted);padding:40px">CARGANDO...</div></div></main>
</div>
<div id="toast"></div>

<script>
// ========== Configuración inicial desde sesión ==========
const session = JSON.parse(localStorage.getItem('tere_session'));
if (!session) {
  window.location.href = 'login.html';
}

const API = 'http://localhost:8080';
let sedeId = session.idSede;
let usuarioActual = session;
let cajones = [];
let cajonSel = null;       // Cajón libre seleccionado para entrada
let cajonSal = null;
let total = 0;
let desc = 0;
let conv = null;
let modoPension = false;
let tarifaActual = null;
let registroActivo = null;
let buscarTimer = null;

// Mostrar configuración de admin solo si rol es ADMIN
if (usuarioActual.rol === 'ADMIN') {
  document.getElementById('admin-config').style.display = 'block';
}

document.getElementById('sede-nombre').textContent =
  {1:'Zona Mercado', 2:'Zona Comercial', 3:'Zona Concurrida'}[sedeId] || ('Sede ' + sedeId);

setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-MX', {hour12: false}), 1000);

// ========== Lógica principal ==========
function cargar() {
  Promise.all([
    api(`/api/cajones/${sedeId}`),
    api(`/api/pensiones/sede/${sedeId}`).catch(() => []),
    api(`/api/tarifas/${sedeId}`).catch(() => null)
  ]).then(([cs, ps, tf]) => {
    cajones = cs || [];
    tarifaActual = tf;
    pintarMapa();
    actualizarStats();
  }).catch(e => {
    console.error(e);
    document.getElementById('parking').innerHTML = '<div style="color:var(--red);padding:40px">ERROR AL CARGAR</div>';
  });
}

function api(path, options = {}) {
  const headers = { 'ngrok-skip-browser-warning': 'true', ...(options.headers || {}) };
  return fetch(`${API}${path}`, { ...options, headers })
    .then(async r => {
      if (!r.ok) {
        let msg = r.status === 401 ? 'No autorizado' : `HTTP ${r.status}`;
        try { const data = await r.json(); msg = data.message || data.mensaje || JSON.stringify(data); } catch (_) {}
        throw new Error(msg);
      }
      if (r.status === 204) return null;
      const text = await r.text();
      return text ? JSON.parse(text) : null;
    });
}

// Muestra la información de un cajón ocupado
function mostrarInfoOcupado(cajon) {
  // Ocultar el selector de cajón libre, mostrar el contenedor de ocupado
  document.getElementById('cajon-seleccion-container').style.display = 'none';
  document.getElementById('cajon-ocupado-container').style.display = 'block';
  document.getElementById('cajon-ocupado-placa').textContent = cajon.placa || 'Sin placa';
  document.getElementById('cajon-ocupado-num').textContent = cajon.numeroCajon;
}

// Vuelve al estado de selección de cajón libre (reinicia la selección)
function resetearSeleccionCajon() {
  document.getElementById('cajon-seleccion-container').style.display = 'block';
  document.getElementById('cajon-ocupado-container').style.display = 'none';
  cajonSel = null;
  document.getElementById('cajon-sel').textContent = '— Ninguno';
}

function pintarMapa() {
  const p = document.getElementById('parking');
  p.innerHTML = '';
  const filas = [...new Set(cajones.map(c => c.fila))];
  filas.forEach(f => {
    const d = document.createElement('div'); d.className = 'fila';
    const l = document.createElement('div'); l.className = 'fila-lbl'; l.textContent = 'F' + f;
    d.appendChild(l);
    cajones.filter(c => c.fila == f).forEach(c => {
      const e = document.createElement('div');
      const ocupado = !c.disponible;
      e.className = 'cajon ' + (c.disponible ? 'libre' : 'ocupado') + (cajonSel === c.idCajon ? ' sel' : '');
      e.innerHTML = '<div class="cajon-icon">' + (c.disponible ? '' : '🚗') + '</div><div>' + c.numeroCajon + '</div>';

      if (c.disponible) {
        // Cajón libre: click → seleccionar para entrada
        e.onclick = () => {
          cajonSel = c.idCajon;
          resetearSeleccionCajon();                 // vuelve al selector de libre
          document.getElementById('cajon-sel').textContent = c.numeroCajon;
          pintarMapa();
        };
      } else {
        // Cajón ocupado: click → mostrar placa
        e.onclick = () => {
          mostrarInfoOcupado(c);
          // Si tenía un cajón libre seleccionado, lo quitamos
          cajonSel = null;
          pintarMapa();   // actualizar el sombreado (quitar .sel)
        };
      }
      d.appendChild(e);
    });
    p.appendChild(d);
  });

  // Si no hay ningún cajón ocupado visible, podemos dejar el selector como estaba
  // (pero si el usuario había hecho clic en ocupado, se queda en ese modo hasta que elija uno libre)
}

function actualizarStats() {
  document.getElementById('libres').textContent = cajones.filter(c => c.disponible).length;
  document.getElementById('ocupados').textContent = cajones.filter(c => !c.disponible).length;
  document.getElementById('pension').textContent = '--'; // pendiente si se necesita
}

function cambiarTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['entrada','salida'][i] === t));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
  modoPension = false;
  resetearSeleccionCajon();   // al cambiar de pestaña, reinicia la selección
  pintarMapa();
}

async function generarCajones() {
  const f = parseInt(document.getElementById('cfg-filas').value) || 4;
  const c = parseInt(document.getElementById('cfg-columnas').value) || 6;
  if (!confirm(`¿Regenerar ${f} filas × ${c} columnas = ${f*c} cajones?`)) return;
  await api(`/api/cajones/generar/${sedeId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filas: f, columnas: c })
  });
  await cargar();
  toast('✅ ' + f * c + ' cajones', 'success');
}

async function entrada() {
  const placa = document.getElementById('placa').value.trim();
  if (!placa || !cajonSel) return toast('Falta placa o cajón', 'error');
  try {
    const res = await api('/api/registro/entrada', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        placa,
        idCajon: cajonSel,
        idSede: sedeId,
        idUsuario: usuarioActual.idUsuario,
        tipoServicio: 'regular'
      })
    });
    resetearSeleccionCajon(); // limpiar selección y mostrar "— Ninguno"
    document.getElementById('placa').value = '';
    await cargar();
    toast(res?.mensaje || 'Entrada ' + placa, 'success');
  } catch (e) {
    toast(e.message || 'No se pudo registrar entrada', 'error');
  }
}

// ---------- resto de funciones sin cambios ----------
function estimatedTotal(horaEntrada) {
  const rate = hourlyRate();
  const mins = minsFrom(horaEntrada);
  return rate && mins ? Math.ceil(mins / 60) * rate : 0;
}

function money(v) {
  const n = Number(v || 0);
  return '$' + n.toFixed(n % 1 ? 2 : 0);
}

function minsFrom(date) {
  const t = date ? new Date(date).getTime() : NaN;
  return Number.isFinite(t) ? Math.max(1, Math.ceil((Date.now() - t) / 60000)) : 0;
}

function hourlyRate() {
  if (!tarifaActual) return 0;
  for (const k of ['montoHora', 'precioHora', 'costoHora', 'tarifaHora', 'costoPorHora', 'monto', 'precio', 'tarifa']) {
    const v = Number(tarifaActual[k]);
    if (v > 0) return v;
  }
  return 0;
}

function buscarSalida() {
  clearTimeout(buscarTimer);
  buscarTimer = setTimeout(buscarSalidaApi, 350);
}

async function buscarSalidaApi() {
  const placa = document.getElementById('buscar').value.trim().toUpperCase();
  ['conv-box', 'total-box'].forEach(id => document.getElementById(id).style.display = 'none');
  if (placa.length < 3) {
    document.getElementById('info-salida').style.display = 'none';
    cajonSal = null;
    registroActivo = null;
    return;
  }
  try {
    registroActivo = await api(`/api/registro/activo?placa=${encodeURIComponent(placa)}&idSede=${sedeId}`);
  } catch (e) {
    registroActivo = null;
  }
  if (!registroActivo) {
    document.getElementById('info-salida').style.display = 'block';
    document.getElementById('info-salida').innerHTML = 'No encontrado';
    cajonSal = null;
    return;
  }
  const c = cajones.find(x => (x.placa && x.placa.toUpperCase() === placa) || x.numeroCajon === registroActivo.numeroCajon);
  cajonSal = c?.idCajon || registroActivo.idCajon || registroActivo.numeroCajon;
  total = estimatedTotal(registroActivo.horaEntrada);
  desc = 0;
  conv = null;
  const mins = minsFrom(registroActivo.horaEntrada);
  const amount = money(total);
  document.getElementById('info-salida').style.display = 'block';
  document.getElementById('info-salida').innerHTML = 'Auto ' + registroActivo.placa + ' · ' + registroActivo.numeroCajon + '<br>~' + mins + ' min · ' + amount;
  document.getElementById('conv-box').style.display = 'block';
  document.getElementById('codigo').value = '';
  document.getElementById('conv-msg').textContent = '';
  document.getElementById('total-box').style.display = 'block';
  document.getElementById('total-txt').textContent = amount;
}

async function aplicarConv() {
  const c = document.getElementById('codigo').value.trim().toUpperCase();
  if (!c) {
    document.getElementById('conv-msg').innerHTML = '✗ Inválido';
    document.getElementById('conv-msg').style.color = 'var(--red)';
    return;
  }
  try {
    const res = await api(`/api/convenio/buscar/${encodeURIComponent(c)}`);
    if (!res?.activo) throw new Error('Convenio inactivo');
    desc = Math.min(total || 20, 20);
    total = Math.max(0, total - desc);
    conv = res;
    document.getElementById('conv-msg').innerHTML = '✓ ' + res.nombre + ' -' + money(desc);
    document.getElementById('conv-msg').style.color = 'var(--green)';
    document.getElementById('total-txt').textContent = money(total);
    document.getElementById('total-txt').style.color = 'var(--accent)';
  } catch (e) {
    document.getElementById('conv-msg').innerHTML = '✗ Inválido';
    document.getElementById('conv-msg').style.color = 'var(--red)';
  }
}

async function salida() {
  const placa = document.getElementById('buscar').value.trim();
  if (!placa || !cajonSal) return toast('Busca placa primero', 'error');
  try {
    const res = await api('/api/registro/salida', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ placa, idSede: sedeId })
    });
    if (conv && desc > 0) {
      await api('/api/convenio/descuento', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idConvenio: conv.idConvenio, monto: desc, placa })
      });
    }
    document.getElementById('buscar').value = '';
    ['info-salida', 'conv-box', 'total-box'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('codigo').value = '';
    document.getElementById('conv-msg').textContent = '';
    cajonSal = null;
    registroActivo = null;
    total = 0;
    desc = 0;
    conv = null;
    await cargar();
    toast((res?.mensaje || 'Salida') + ' ' + money(res?.totalCobrado), 'success');
  } catch (e) {
    toast(e.message || 'No se pudo finalizar', 'error');
  }
}

function cerrarSesion() {
  localStorage.removeItem('tere_session');
  window.location.href = 'login.html';
}

let _tt;
function toast(m, t = 'info') {
  const e = document.getElementById('toast');
  e.textContent = m;
  e.className = t;
  e.style.display = 'block';
  clearTimeout(_tt);
  _tt = setTimeout(() => e.style.display = 'none', 2500);
}

// Iniciar la carga al abrir la página
cargar();
</script>
</body>
</html>
